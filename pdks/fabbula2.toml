# fabbula2 PDK Configuration
# Imaginary 2nm nanosheet (gate-all-around) PDK inspired by TSMC N2
#
# TSMC N2: first-generation nanosheet transistors.
#
# This is a fictional PDK for demonstration and stress-testing purposes.
# DRC rules are plausible estimates for a 2nm top-metal stack.

[pdk]
name = "fabbula2"
description = "fabbula2 - imaginary 2nm nanosheet PDK (inspired by TSMC N2)"
node_nm = 2
db_units_per_um = 1000

# Top metal: Aluminum pad / redistribution layer (topmost)
[artwork_layer]
name = "AP"
gds_layer = 150
gds_datatype = 0
purpose = "drawing"

# Alternative: M15 top copper routing layer
[artwork_layer_alt]
name = "M15"
gds_layer = 140
gds_datatype = 0
purpose = "drawing"

# DRC rules for AP (thick aluminum pad layer)
# Aluminum is not CMP-polished, so no density constraints (like sky130 met5).
# max_width requires slotting for stress relief on wide features.
[drc]
min_width = 0.800
min_spacing = 0.800
min_area = 1.000
density_min = 0.0
density_max = 1.0
density_window_um = 700.0
max_width = 25.000

# DRC rules for M15 (fine-pitch top routing, similar to ASAP7 M9)
# Copper layer has CMP density limits. density_min is typically handled by
# dummy fill insertion tools, not artwork - so set to 0.0.
[drc_alt]
min_width = 0.040
min_spacing = 0.040
min_area = 0.008
density_min = 0.0
density_max = 0.80
density_window_um = 500.0
max_width = 2.000
wide_metal_threshold = 0.200
wide_metal_spacing = 0.060

# Grid snapping
[grid]
manufacturing_grid_um = 0.001 # 1nm grid (sub-2nm node)

# Metal stack (15 metal layers + AP)
[[metal_stack]]
name = "M1"
gds_layer = 10
gds_datatype = 0

[[metal_stack]]
name = "M2"
gds_layer = 20
gds_datatype = 0

[[metal_stack]]
name = "M3"
gds_layer = 30
gds_datatype = 0

